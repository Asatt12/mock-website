<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | NorthPeak Nutrition</title>
  <meta name="description" content="Review your NorthPeak Nutrition cart and order summary.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="./index.html"><span class="brand-mark">NP</span><span>NorthPeak Nutrition</span></a>
      <nav class="nav">
        <a href="./shop.html">Shop</a>
        <a href="./index.html#products">Products</a>
        <a href="./about.html">About / Standards</a>
        <a href="./learn.html">Learn</a>
      </nav>
      <div class="header-actions">
        <a class="icon-btn" href="./shop.html" aria-label="Search">⌕</a>
        <a class="icon-btn" href="./cart.html" aria-label="Cart">🛒 <span class="cart-count">0</span></a>
      </div>
    </div>
  </header>
  <main class="section">
    <div class="container split">
      <section class="card">
        <h1>Your Cart</h1>
        <div id="cart-items"></div>
      </section>
      <aside class="card">
        <h2>Order Summary</h2>
        <p>Subtotal: <strong id="cart-subtotal">$0.00</strong></p>
        <p>Shipping: <strong id="cart-shipping">$0.00</strong></p>
        <p>Total: <strong id="cart-total">$0.00</strong></p>
        <p class="small muted">This is a mock checkout flow for testing only.</p>
        <p><button id="checkout-btn" class="btn btn-primary">Proceed to Checkout</button></p>
        <p><button id="clear-cart" class="btn btn-outline">Clear Cart</button></p>
        <p id="checkout-note" class="small muted"></p>
      </aside>
    </div>
  </main>
  <script src="./script.js"></script>
</body>
</html>
